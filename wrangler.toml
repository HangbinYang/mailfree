JWT_TOKENGUEST_PASSWORD="ranj2nG8xjAXd5cg"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="mail.clawpilot.me"
RESEND_API_KEY="rc#X%m339N9k%H3D"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

